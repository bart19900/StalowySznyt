<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stalowy Sznyt</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#111;
color:white;
}

/* MENU */

header{
position:fixed;
top:0;
left:0;
width:100%;
height:80px;
background:#1b1b1b;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
z-index:1000;
box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo img{
width:60px;
height:60px;
border-radius:10px;
}

.logo h1{
font-size:28px;
font-weight:700;
color:#ff5e00;
}

nav ul{
display:flex;
list-style:none;
gap:35px;
}

nav a{
text-decoration:none;
color:white;
font-size:18px;
transition:.3s;
}

nav a:hover{
color:#ff5e00;
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url("https://images.unsplash.com/photo-1504307651254-35680f356dfd?auto=format&fit=crop&w=1800&q=80") center center/cover;
position:relative;
}

.hero::after{
content:'';
position:absolute;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
}

.hero-content{
position:relative;
z-index:2;
text-align:center;
}

.hero h2{
font-size:70px;
margin-bottom:20px;
color:#ff5e00;
}

.hero p{
font-size:24px;
}

/* PORTFOLIO */

.portfolio{
padding:100px 0;
background:#181818;
overflow:hidden;
}

.portfolio h2{
text-align:center;
font-size:40px;
margin-bottom:60px;
}

.slider{

overflow:hidden;
white-space:nowrap;

}

.slide-track{

display:inline-flex;

animation:scroll 30s linear infinite;

}

.slide{

margin:0 15px;

}

.slide img{

width:420px;
height:260px;
object-fit:cover;
border-radius:15px;
transition:.4s;
cursor:pointer;
}

.slide img:hover{

transform:scale(1.05);

}

@keyframes scroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

/* STOPKA */

footer{

padding:40px;
text-align:center;
background:#111;

}

</style>

</head>
<body>

<header>

<div class="logo">

<img src="logo.png">

<h1>Stalowy Sznyt</h1>

</div>

<nav>

</nav>

</header>
